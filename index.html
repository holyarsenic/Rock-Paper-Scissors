<!DOCTYPE html>
<html>

<head>
  <title>rock paper scissors</title>
  <link rel="stylesheet" href="Styles/rock-autoplay.css">
</head>

<body>
  <p class="title">Rock Paper Scissors</p>
  <button onclick="resultTaken('Rock');" class="move-button"><img src="images/rock-emoji.png"
      class="rock-emoji"></button>

  <button onclick="resultTaken('Paper');" class="move-button"><img src="images/paper-emoji.png"
      class="paper-emoji"></button>

  <button onclick="resultTaken('Scissors');" class="move-button"><img src="images/scissors-emoji.png"
      class="scissors-emoji"></button>

  <p class="score result"></p>
  <p class="game"></p>
  <p class="blank"></p>

  <button onclick="score.Wins= 0; 
                   score.Loses=0; 
                   score.Ties=0;
                   localStorage.removeItem('score');
                   updateTheScore();" class="reset-score">Reset Score</button>

  <button onclick="autoplay();" class="auto-play-button">Auto Play</button>

  <script src="Scripts/rock-autoplay.js"></script>

</body>

</html>
